<!DOCTYPE html>
<html>
<head>
<title>Knitting Pocket Buddy</title>
<link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>
<div class="intro" id="title-section">
    <h1>Knitting Pocket Buddy</h1>
    <p>Welcome to the Knitting Pocket Buddy application!</p>
</div>
<div class="features" id="features-section">
    <section id="row-counter">
        <h2>Row Counter</h2>
        <p id="row-count">0</p>
        <section id="counter-options">
            <button id="add-row-btn">+</button>
            <button id="sub-row-btn">-</button>
            <button id="save-row-val">Save</button>
            <button id="load-row-val">Load</button>
            <button id="reset-btn">Reset</button>
        </section>
    </section>
    <section id="stopwatch">
        <h2>Stopwatch</h2>
        <p id="timer-display">00:00:00</p>
        <section id="timer-options">
            <button id="start-timer-btn">Start</button>
            <button id="pause-timer-btn">Pause</button>
            <!-- <button id="stop-timer-btn">Stop</button> -->
            <button id="reset-timer-btn">Reset</button>
        </section>
    </section>
</div>

</body>

<script src="main.js"></script>
</html>
